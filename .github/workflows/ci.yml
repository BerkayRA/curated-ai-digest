name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Type-check, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The generated Prisma client is required before type-check/test/build
      # across the workspace. `prisma generate` needs no database.
      - name: Generate Prisma client
        run: pnpm --filter @digest/db generate

      # Build first, then lint + type-check + test. Web's `type-check` (tsc)
      # includes Next's generated `.next/types`; running it concurrently with
      # `next build` races on `.next` (TS6053), so build is ordered first. Lint
      # does not touch `.next`, so it runs with the checks.
      - name: Build
        run: pnpm turbo run build

      - name: Lint, type-check, test
        run: pnpm turbo run lint type-check test

  e2e-smoke:
    name: E2E smoke (login page)
    runs-on: ubuntu-latest
    needs: build
    # CI-safe functional smoke (login page renders) — no visual snapshots, no
    # system Chrome. Now a REQUIRED gate: it has been reliably green, so a
    # failure here should block merge.
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @digest/db generate

      - name: Install Playwright Chromium
        run: pnpm --filter @digest/web exec playwright install --with-deps chromium

      - name: Run smoke spec
        run: pnpm --filter @digest/web exec playwright test --config playwright.smoke.config.cjs
