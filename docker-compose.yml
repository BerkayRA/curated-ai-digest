services:
  db:
    image: postgres:16-alpine
    container_name: bulten_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bulten
      POSTGRES_PASSWORD: bulten
      POSTGRES_DB: mega_bulten
    ports:
      - "5433:5432"
    volumes:
      - bulten_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bulten -d mega_bulten"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: bulten_adminer
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: bulten_web
    restart: unless-stopped
    ports:
      - "3100:3100"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: bulten_worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  bulten_pgdata:
